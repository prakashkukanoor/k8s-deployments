replicas: 3
service:
  name: http
  port: 80
application:
  name: frontend-app
  namespace: frontend
  version: v1.0.0
  image: busybox
  tag: latest
  imagePullPolicy: IfNotPresent
  command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
  port: 9090
sideCar:
  name: sidecar-container
  image: docker.io/mccutchen/go-httpbin
  tag: v2.15.0
  imagePullPolicy: IfNotPresent
  port: 8080
  

