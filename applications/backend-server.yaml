##################################################################################################
# httpbin service
##################################################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: backend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-server
  namespace: backend
---
apiVersion: v1
kind: Service
metadata:
  name: backend-server
  namespace: backend
  labels:
    app: backend-server
    service: backend-server
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8080
  selector:
    app: backend-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-server
  namespace: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-server
      version: v1
  template:
    metadata:
      labels:
        app: backend-server
        version: v1
    spec:
      serviceAccountName: backend-server
      containers:
      - image: docker.io/mccutchen/go-httpbin:v2.15.0
        imagePullPolicy: IfNotPresent
        name: backend-server
        ports:
        - containerPort: 8080