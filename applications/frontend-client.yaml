##################################################################################################
# httpbin service
##################################################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: frontend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-client
  namespace: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-client
  namespace: frontend
  labels:
    app: frontend-client
    service: frontend-client
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8080
  selector:
    app: frontend-client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-client
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-client
      version: v1
  template:
    metadata:
      labels:
        app: frontend-client
        version: v1
    spec:
      serviceAccountName: frontend-client
      containers:
      - image: busybox:latest
        imagePullPolicy: IfNotPresent
        name: frontend-client
        command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
        ports:
        - containerPort: 9090

      - image: docker.io/mccutchen/go-httpbin:v2.15.0
        imagePullPolicy: IfNotPresent
        name: sidecar-container
        ports:
        - containerPort: 8080